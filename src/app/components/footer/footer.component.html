<footer class="site-footer">
  <div class="container">
    <div class="footer-inner">
      <a routerLink="/" class="footer-brand">Portfolio</a>
      <nav class="footer-social">
        <a *ngFor="let link of socialLinks" [href]="link.url" target="_blank" rel="noopener noreferrer" class="footer-link">
          {{ link.platform }}
        </a>
        <a [href]="resumeUrl" target="_blank" rel="noopener noreferrer" class="footer-link">Resume</a>
      </nav>
    </div>
    <p class="footer-copy">&copy; {{ currentYear }} Portfolio. Built with Clarity &amp; Energy.</p>
  </div>
</footer>
