<header class="site-header">
  <nav class="nav-bar">
    <div class="nav-inner">
      <!-- Logo -->
      <a routerLink="/" class="brand-logo">Portfolio</a>

      <!-- Nav Links -->
      <ul class="nav-links">
        <li *ngFor="let item of menuItems">
          <a [routerLink]="item.routerLink" class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact: item.routerLink[0] === '/'}">
            {{ item.label }}
          </a>
        </li>
      </ul>

      <!-- CTA + Mobile Toggle -->
      <div class="nav-actions">
        <a routerLink="/contact" class="btn-contact">Contact Me</a>
        <button class="mobile-toggle" (click)="toggleMobileMenu()" [class.open]="isMobileMenuOpen()" aria-label="Toggle menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div class="mobile-menu" [class.open]="isMobileMenuOpen()">
      <ul class="mobile-nav-links">
        <li *ngFor="let item of menuItems">
          <a [routerLink]="item.routerLink" class="mobile-nav-link" routerLinkActive="active" (click)="closeMobileMenu()">
            {{ item.label }}
          </a>
        </li>
        <li>
          <a routerLink="/contact" class="btn-contact mobile-cta" (click)="closeMobileMenu()">Contact Me</a>
        </li>
      </ul>
    </div>
  </nav>
</header>
